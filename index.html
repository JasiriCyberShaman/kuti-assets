<div id="kuti-container" style="width: 100%; height: 500px; background: transparent; cursor: grab; display: flex; align-items: center; justify-content: center; overflow: hidden;">
    <div id="boot-status" style="color: #bc13fe; font-family: 'Courier New', monospace; font-size: 14px; text-shadow: 0 0 5px #bc13fe;">
        // INITIALIZING_DDAIMON_OS...
    </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
    // --- 1. CONFIGURATION ---
    
    // The base URL for your 3D assets and engine scripts hosted on GitHub Pages
    const GITHUB_ASSETS_URL = 'https://jasiricybershaman.github.io/kuti-assets'; 
    
    // Using the WSS (WebSocket Secure) protocol for the neural link via Cloudflare Tunnel.
    // This URL should match the one provided by your Cloudflare Tunnel setup.
    const CLOUDFLARE_BRIDGE_URL = 'wss://api.ddaimon.com';

    /**
     * BOOT SEQUENCE:
     * Asynchronously loads the 3D Engine and establishes the initial connection to the parent window (Framer).
     */
    async function bootKuti() {
        const container = document.getElementById('kuti-container');
        
        try {
            // --- 2. THE NEURAL HANDSHAKE (BROADCAST TO FRAMER) ---
            // We use window.parent.postMessage because this HTML is likely embedded in an iframe.
            // This wakes up your SocketBridge.tsx and tells it where to connect the WebSocket.
            console.log(">>> [Transmitting]: Sending Neural Link URL to Framer Overlay...");
            window.parent.postMessage({ 
                type: "CONNECT_TO_CLOUDFLARE",
                url: CLOUDFLARE_BRIDGE_URL 
            }, "*");

            // --- 3. DYNAMIC ENGINE IMPORT ---
            // We append a timestamp (?v=Date.now()) to bust the browser cache.
            // This ensures that if you update KutiEngine.js on GitHub, users get the latest version immediately.
            const engineUrl = `${GITHUB_ASSETS_URL}/KutiEngine.js?v=${Date.now()}`;
            const module = await import(engineUrl);
            
            // --- 4. INITIALIZE THREE.JS SCENE ---
            // Pass the container ID and asset path down to the KutiEngine
            await module.initKuti('kuti-container', GITHUB_ASSETS_URL);

            console.log(`[Cyber Shaman]: Kuti Systems Online.`);

        } catch (err) {
            // FATAL ERROR HANDLING
            console.error("XXX [System Failure]:", err);
            container.innerHTML = `
                <div style="color: #ff4444; font-family: monospace; text-align: center;">
                    [CRITICAL_BOOT_ERROR]<br>
                    <span style="font-size: 10px; color: #888;">${err.message}</span>
                </div>`;
        }
    }

    /**
     * UI & DOM EVENT LISTENER
     * While KutiEngine.js listens for 3D-specific commands (animations, visemes), 
     * this listener acts as the DOM/UI layer interceptor.
     */
    window.addEventListener("message", (e) => {
        // Prevent processing messages that don't fit our protocol
        if (!e.data || !e.data.type) return;

        // DIAGNOSTIC: Track signals crossing the bridge
        console.log("![Kuti Engine UI]: Received Signal Type:", e.data.type);
        
        // Destructure the payload sent from Framer / SocketBridge
        const { type, animation, visemes, rate, isOverlay } = e.data;

        switch (type) {
            // 1. ENGINE PASS-THROUGHS
            // These are handled primarily by KutiEngine.js, but we can log them 
            // here to confirm the index.html boundary is receiving them properly.
            case "SET_ANIMATION":
                console.log(`[DOM Sync]: Kuti transitioning to -> ${animation}`);
                break;
                
            case "SET_VISEMES":
                // Visemes fire rapidly (often 60 times a second during speech). 
                // Keep this empty or commented out to prevent console flooding.
                // console.log(`[DOM Sync]: Processing Lip-sync targets.`); 
                break;

            case "RESET_CAMERA":
                console.log(`[DOM Sync]: Camera tracking reset triggered.`);
                break;

            // 2. DOM / UI SPECIFIC COMMANDS
            // Handle things that affect the HTML container itself, rather than the 3D scene.
            case "TOGGLE_OVERLAY":
                // If Framer tells us this is an overlay, we might want to disable pointer events
                // so the user can click *through* the 3D canvas to the website beneath it.
                if (isOverlay !== undefined) {
                    const container = document.getElementById('kuti-container');
                    container.style.pointerEvents = isOverlay ? 'none' : 'auto';
                    console.log(`[DOM Sync]: Overlay click-through mode set to: ${isOverlay}`);
                }
                break;

            case "SHOW_BOOT_STATUS":
                // In case you need to reactivate the loading text from Framer
                const status = document.getElementById('boot-status');
                if (status) status.style.display = 'block';
                break;

            default:
                // Silently ignore unrecognized types to avoid clutter, 
                // or log them if you are deep in debugging.
                // console.warn(`[DOM Sync]: Unrecognized signal -> ${type}`);
                break;
        }
    });

    // Ignite the sequence
    bootKuti();
</script>
